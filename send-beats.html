    <style>
        .send-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .send-card { background: var(--card); border: 1px solid var(--border-light); border-radius: 24px; padding: 50px 40px; max-width: 560px; width: 100%; text-align: center; }
        .send-card h1 { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; font-weight: 900; letter-spacing: 3px; color: var(--primary); margin-bottom: 8px; }
        .send-card p { font-family: 'Space Mono', monospace; font-size: 0.78rem; color: #888; line-height: 1.8; margin-bottom: 24px; }
        .order-info { background: rgba(0,255,136,0.04); border: 1px solid rgba(0,255,136,0.15); border-radius: 14px; padding: 20px; margin-bottom: 28px; text-align: left; }
        .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-family: 'Space Mono', monospace; font-size: 0.72rem; }
        .info-row:last-child { border-bottom: none; }
        .info-row span:first-child { color: #666; }
        .info-row span:last-child { color: #fff; font-weight: bold; }
        .beats-list { text-align: left; margin-bottom: 28px; }
        .beat-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-family: 'Space Mono', monospace; font-size: 0.72rem; color: #aaa; }
        .beat-row i { color: var(--primary); }
        .send-btn { width: 100%; padding: 18px; background: var(--primary); border: none; border-radius: 14px; color: black; font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 0.9rem; letter-spacing: 3px; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .send-btn:hover { box-shadow: 0 0 30px rgba(0,255,136,0.5); transform: translateY(-2px); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .status-msg { font-family: 'Space Mono', monospace; font-size: 0.78rem; margin-top: 16px; padding: 14px; border-radius: 10px; display: none; }
        .status-msg.success { background: rgba(0,255,136,0.08); border: 1px solid rgba(0,255,136,0.2); color: var(--primary); }
        .status-msg.error { background: rgba(255,68,68,0.08); border: 1px solid rgba(255,68,68,0.2); color: #ff4444; }
        .invalid-page { text-align: center; padding: 60px 20px; }
        .invalid-page i { font-size: 3rem; color: #333; display: block; margin-bottom: 20px; }
        .invalid-page h2 { font-family: 'Orbitron', sans-serif; color: #555; letter-spacing: 3px; font-size: 1rem; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="container nav-content">
            <a href="index.html" class="logo" style="text-decoration:none">
                <div class="logo-wrapper">
                    <img src="Logo.PNG" alt="KAIJU BEATS" class="logo-img">

                    <div class="logo-lightning logo-lightning-2"></div>

                <div class="logo-underline"></div>

    <main class="send-page container" id="mainContent">
        <!-- Filled by JS -->
    </main>

    <script>
    const EMAILJS_PUBLIC_KEY  = '7E6XV-vYEiZ0_WpyD';
    const EMAILJS_SERVICE_ID  = 'service_j2kw8w9';
    const EMAILJS_TEMPLATE_FR = 'template_rbznd3c';
    const EMAILJS_TEMPLATE_EN = 'template_ekgt4yq';

    emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });

    // Parse URL params
    // Password protection
    const PASSWORD = 'Cheikhbane2003BEATS';
    const entered = prompt('🔐 Accès réservé — Entrez le mot de passe :');
    if (entered !== PASSWORD) {
        document.getElementById('mainContent').innerHTML = `
            <div class="invalid-page">
                <i class="fas fa-lock"></i>
                <h2>ACCÈS REFUSÉ</h2>
            </div>`;
        throw new Error('Wrong password');
    }

    const params = new URLSearchParams(window.location.search);
    let raw = params.get('d');
    // Support btoa encoded data
    if (raw) {
        try {
            const decoded = decodeURIComponent(raw);
            // Try btoa decode first
            try {
                const btoaDecoded = atob(decoded);
                JSON.parse(btoaDecoded); // test if valid JSON
                raw = btoaDecoded;
            } catch(e) {
                // Not btoa, use as-is (old format)
                raw = decoded;
            }
        } catch(e) {}
    }

    if (!raw) {
        document.getElementById('mainContent').innerHTML = `
            <div class="invalid-page">
                <i class="fas fa-exclamation-triangle"></i>
                <h2>LIEN INVALIDE</h2>
            </div>`;
    } else {
        try {
            const raw_data = JSON.parse(raw);
            
            // Support both short format {n,e,b,t,l} and full format
            const customer_name  = raw_data.n || raw_data.customer_name;
            const customer_email = raw_data.e || raw_data.customer_email;
            const total          = raw_data.t || raw_data.total;
            const lang           = raw_data.l || raw_data.lang || 'fr';
            const beatTitles     = raw_data.b ? raw_data.b.split(',') : [];

            const driveLinks = {
                'ANUBIS':        'https://drive.google.com/file/d/1JYRJo2K1-ySQAh664mjrXrbLi6dUNyM9/view',
                'Aurore':        'https://drive.google.com/file/d/1jjTBGBzLyFbukDTbX9L_qhIysr_hRDES/view',
                'BAD':           'https://drive.google.com/file/d/1PgNc8RWvhFu46IMJrxFHKUch1d6HcUWM/view',
                'BERGHAIN':      'https://drive.google.com/file/d/1HoecwsFtSMfrZtMjSK8Jmc9G7DP2EgJu8/view',
                'Brooklyn 1964': 'https://drive.google.com/file/d/1yYTSXbJI3J5hrv_ZrnieFF5VSjcQQGVE/view',
                'CARNAGE':       'https://drive.google.com/file/d/1IlVfl7t-f3XWXo4vmZM_90mZR3BNRkz8/view',
                'Distancia':     'https://drive.google.com/file/d/1bB34UQt3sfPWQ2mfSUVhMPkOyZupcuNe/view',
                'ECLIPSE':       'https://drive.google.com/file/d/1t1kZLHb9rbWGX-4YMRslvRw8OKstVFCO/view',
                'Elevation':     'https://drive.google.com/file/d/1GlgT0cPwyF7uhBHOTiRC26a0-5T5c6Pu/view',
                'EMPIRE':        'https://drive.google.com/file/d/1MDqTqQjCD50jETK-TsxK2KYKoyMLEva8/view',
                'Illusion':      'https://drive.google.com/file/d/13cwArN1QFNnYtjHdHbSa9zRox062FXUC/view',
                'Sabah':         'https://drive.google.com/file/d/1OIw_IZwhKmOKb46VMflP-JJin5kbzzFJ/view',
                'LARME':         'https://drive.google.com/file/d/17DEhRDFJrouMw6ONLy5Csx7maRHglXqr/view',
                'MEMORIES':      'https://drive.google.com/file/d/1q37XZVVPBuCJkqIOxrICOtaeHisbIbe6/view',
                'MIRAGE':        'https://drive.google.com/file/d/15cUNIMxH1KMhXmPlv5ZYh7p51tg63IQC/view',
                'Ombre':         'https://drive.google.com/file/d/1OSJ2OdTXg3jdypAjb2p8CYJya0DTGnRM/view',
                'Renaissance':   'https://drive.google.com/file/d/1r1F9RzegirGh883ppl7PQLrP4PIW7-Qf/view',
                'SHAKE':         'https://drive.google.com/file/d/1sVxYyG-YH5OY-FX3NVSlVBfVKAP0BNQU/view',
                'Solitude':      'https://drive.google.com/file/d/1RqGyCD8o2tlG_5tESRk-O1wjgqy29Q7O/view',
                'SOLUNA':        'https://drive.google.com/file/d/1e1jun_ZlSPPDvzAKA6GIve3AYm27No9v/view',
                'Sunset':        'https://drive.google.com/file/d/1vQwqf3GYVC1J1GCM-KV_F4sEkD2hDC_P/view',
                'TRUTH':         'https://drive.google.com/file/d/1LfiwN3Jm4qB1VEB9JNBUvX6c1LijJPlq/view',
                'ZURA':          'https://drive.google.com/file/d/16RReB9RJfMjuoBqXdfmQrubnRSP32OLv/view',
            };

            // Build download links from beat titles
            const download_links = beatTitles.map((title, i) => {
                const link = driveLinks[title.trim()] || '#';
                return `🎵 ${title.trim()}\n${link}`;
            }).join('\n\n');

            let beatsHTML = '';
            beatTitles.forEach(title => {
                const link = driveLinks[title.trim()] || '#';
                beatsHTML += `<div class="beat-row"><i class="fas fa-music"></i> ${title.trim()} — <a href="${link}" target="_blank" style="color:var(--primary)">Lien Drive</a></div>`;
            });

            document.getElementById('mainContent').innerHTML = `
                <div class="send-card">
                    <h1>🎵 ENVOYER LES BEATS</h1>
                    <p>Vérifie les infos ci-dessous puis clique le bouton pour envoyer les beats au client.</p>

                    <div class="order-info">
                        <div class="info-row"><span>CLIENT</span><span>${customer_name}</span></div>
                        <div class="info-row"><span>EMAIL</span><span>${customer_email}</span></div>
                        <div class="info-row"><span>TOTAL</span><span>${total}€</span></div>
                    </div>

                    <div class="beats-list">${beatsHTML}</div>

                    <button class="send-btn" id="sendBtn">
                        <i class="fas fa-paper-plane"></i> ENVOYER LES BEATS
                    </button>
                    <div class="status-msg" id="statusMsg"></div>
                </div>
            `;

            document.getElementById('sendBtn').onclick = () => {
                const btn = document.getElementById('sendBtn');
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Envoi en cours...';

                emailjs.send(
                    EMAILJS_SERVICE_ID,
                    lang === 'fr' ? EMAILJS_TEMPLATE_FR : EMAILJS_TEMPLATE_EN,
                    { customer_name, customer_email, download_links, total }
                ).then(() => {
                    const msg = document.getElementById('statusMsg');
                    msg.className = 'status-msg success';
                    msg.textContent = '✅ Beats envoyés avec succès à ' + customer_email + ' !';
                    msg.style.display = 'block';
                    btn.innerHTML = '<i class="fas fa-check"></i> ENVOYÉ !';
                }).catch(err => {
                    const msg = document.getElementById('statusMsg');
                    msg.className = 'status-msg error';
                    msg.textContent = '❌ Erreur : ' + err.text;
                    msg.style.display = 'block';
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-paper-plane"></i> RÉESSAYER';
                });
            };

        } catch(e) {
            document.getElementById('mainContent').innerHTML = `
                <div class="invalid-page">
                    <i class="fas fa-exclamation-triangle"></i>
                    <h2>LIEN INVALIDE</h2>
                </div>`;
        }
    }
    // Custom cursor
window.addEventListener('load', function() {
        var d = document.getElementById('cursorDot');
        var r = document.getElementById('cursorRing');
        if (!d||!r) return;
        var mx=0,my=0,rx=0,ry=0;
        document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;d.style.left=mx+'px';d.style.top=my+'px';});
        (function loop(){rx+=(mx-rx)*0.12;ry+=(my-ry)*0.12;r.style.left=rx+'px';r.style.top=ry+'px';requestAnimationFrame(loop);})();
        document.querySelectorAll('button,a,input').forEach(function(el){
            el.addEventListener('mouseenter',function(){d.classList.add('hovering');r.classList.add('hovering');});
            el.addEventListener('mouseleave',function(){d.classList.remove('hovering');r.classList.remove('hovering');});
        });
    });
    </script>
</body>
</html>
