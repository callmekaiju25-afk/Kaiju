<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAIJU BEATS | Send Beats</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=32.0">
    <style>
        .send-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .send-card{background:var(--bg-card);border:1px solid var(--border);border-radius:24px;padding:50px 40px;max-width:560px;width:100%;text-align:center}
        .send-card h1{font-family:'Orbitron',sans-serif;font-size:1.1rem;font-weight:900;letter-spacing:3px;color:var(--violet-hi);margin-bottom:8px}
        .send-card>p{font-family:'Space Mono',monospace;font-size:0.78rem;color:var(--text-soft);line-height:1.8;margin-bottom:24px}
        .order-info{background:rgba(123,44,191,0.06);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:28px;text-align:left}
        .info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-family:'Space Mono',monospace;font-size:0.72rem}
        .info-row:last-child{border-bottom:none}
        .info-row span:first-child{color:var(--text-soft)}
        .info-row span:last-child{color:var(--text);font-weight:bold}
        .beats-list{text-align:left;margin-bottom:28px}
        .beat-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-family:'Space Mono',monospace;font-size:0.72rem;color:var(--text-mid)}
        .beat-row i{color:var(--violet-hi)}
        .beat-row a{color:var(--violet-hi);text-decoration:none;transition:opacity 0.2s}
        .beat-row a:hover{opacity:0.75}
        .send-btn{width:100%;padding:18px;background:linear-gradient(135deg,var(--red),var(--violet));border:none;border-radius:14px;color:#fff;font-family:'Orbitron',sans-serif;font-weight:900;font-size:0.9rem;letter-spacing:3px;cursor:pointer;transition:all 0.3s;display:flex;align-items:center;justify-content:center;gap:12px}
        .send-btn:hover{box-shadow:0 0 32px rgba(123,44,191,0.5);transform:translateY(-2px)}
        .send-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
        .status-msg{font-family:'Space Mono',monospace;font-size:0.78rem;margin-top:16px;padding:14px;border-radius:10px;display:none}
        .status-msg.success{background:rgba(123,44,191,0.1);border:1px solid var(--border-hi);color:var(--violet-hi)}
        .status-msg.error{background:rgba(255,68,68,0.08);border:1px solid rgba(255,68,68,0.2);color:#ff4444}
        .invalid-page{text-align:center;padding:80px 20px}
        .invalid-page i{font-size:3.5rem;color:#333;display:block;margin-bottom:20px}
        .invalid-page h2{font-family:'Orbitron',sans-serif;color:#555;letter-spacing:3px;font-size:1rem}

        /* Password gate */
        .pw-gate{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;padding:20px}
        .pw-card{background:var(--bg-card);border:1px solid var(--border-hi);border-radius:20px;padding:44px 40px;max-width:380px;width:100%;text-align:center}
        .pw-card h2{font-family:'Orbitron',sans-serif;font-size:0.9rem;font-weight:900;letter-spacing:3px;color:var(--violet-hi);margin-bottom:8px}
        .pw-card p{font-family:'Space Mono',monospace;font-size:0.68rem;color:var(--text-soft);margin-bottom:24px;line-height:1.6}
        .pw-input{width:100%;background:rgba(123,44,191,0.05);border:1px solid var(--border-hi);border-radius:10px;padding:14px 18px;color:var(--text);font-family:'Space Mono',monospace;font-size:0.9rem;outline:none;box-sizing:border-box;text-align:center;letter-spacing:4px;margin-bottom:12px;transition:all 0.3s}
        .pw-input:focus{border-color:rgba(123,44,191,0.5);box-shadow:0 0 15px rgba(123,44,191,0.1)}
        .pw-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--red),var(--violet));border:none;border-radius:10px;color:#fff;font-family:'Orbitron',sans-serif;font-weight:700;font-size:0.8rem;letter-spacing:2px;cursor:pointer;transition:all 0.3s}
        .pw-btn:hover{box-shadow:0 0 24px rgba(123,44,191,0.4);transform:translateY(-1px)}
        .pw-error{font-size:0.65rem;color:#ff4444;font-family:'Space Mono',monospace;margin-top:8px;display:none}
    </style>
</head>
<body>
    <div class="cursor-dot" id="cursorDot"></div>
    <div class="cursor-ring" id="cursorRing"></div>
    <div class="bg-glow"></div>
    <div class="scan-line"></div>
    <div class="particles">
        <div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div>
        <div class="particle"></div>
    </div>

    <svg class="deco-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
      <defs>
        <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#7B2CBF" stop-opacity="0.5"/><stop offset="100%" stop-color="#4C0080" stop-opacity="0.2"/></linearGradient>
        <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#7B2CBF" stop-opacity="0.4"/><stop offset="100%" stop-color="#C1121F" stop-opacity="0.15"/></linearGradient>
        <linearGradient id="fadeBot" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0B0B0F" stop-opacity="0"/><stop offset="60%" stop-color="#0B0B0F" stop-opacity="0.55"/><stop offset="100%" stop-color="#0B0B0F" stop-opacity="1"/></linearGradient>
        <filter id="f1"><feGaussianBlur stdDeviation="22"/></filter>
        <filter id="f3"><feGaussianBlur stdDeviation="35"/></filter>
      </defs>
      <path d="M -120 -80 C 60 -30,220 50,360 130 C 500 210,600 320,580 450 C 560 580,460 650,360 690 C 260 730,140 710,60 660 Z" fill="url(#g1)" filter="url(#f1)"/>
      <path d="M 1560 -60 C 1420 10,1300 100,1240 210 C 1180 320,1200 450,1260 550 C 1320 650,1420 700,1560 940 Z" fill="url(#g2)" filter="url(#f1)"/>
      <ellipse cx="160" cy="180" rx="160" ry="110" fill="#C1121F" opacity="0.08" filter="url(#f3)"/>
      <ellipse cx="1300" cy="220" rx="140" ry="100" fill="#7B2CBF" opacity="0.07" filter="url(#f3)"/>
      <rect x="0" y="0" width="1440" height="900" fill="url(#fadeBot)"/>
    </svg>

    <nav class="navbar">
        <div class="container nav-content">
            <a href="index.html" class="logo" style="text-decoration:none">
                <div class="logo-wrapper">
                    <img src="Logo.PNG" alt="KAIJU BEATS" class="logo-img">
                </div>
            </a>
        </div>
    </nav>

    <!-- PASSWORD GATE -->
    <div id="pwGate" class="send-page">
        <div class="pw-card">
            <div style="font-size:2.5rem;margin-bottom:16px">🔐</div>
            <h2>ACCÈS RÉSERVÉ</h2>
            <p>Cette page est réservée à Kaiju.<br>Entre le mot de passe pour continuer.</p>
            <input type="password" class="pw-input" id="pwInput" placeholder="••••••••••" autocomplete="off">
            <p class="pw-error" id="pwError">❌ Mot de passe incorrect.</p>
            <button class="pw-btn" id="pwBtn">ACCÉDER</button>
        </div>
    </div>

    <!-- MAIN CONTENT (caché jusqu'au bon mdp) -->
    <main class="send-page" id="mainContent" style="display:none">
        <!-- Rempli par JS après auth -->
    </main>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
    const EMAILJS_PUBLIC_KEY  = '7E6XV-vYEiZ0_WpyD';
    const EMAILJS_SERVICE_ID  = 'service_j2kw8w9';
    const EMAILJS_TEMPLATE_FR = 'template_rbznd3c';
    const EMAILJS_TEMPLATE_EN = 'template_ekgt4yq';
    // Mot de passe hashé côté client (protection basique — seul Kaiju a accès à cette page)
    const PW_HASH = '6e4a8e2f3b1c9d0f5a7b2c8e4f1d6a3b'; // hash de 'Cheikhbane2003BEATS'

    const driveLinks = {
        'ANUBIS':        'https://drive.google.com/file/d/1JYRJo2K1-ySQAh664mjrXrbLi6dUNyM9/view',
        'Aurore':        'https://drive.google.com/file/d/1jjTBGBzLyFbukDTbX9L_qhIysr_hRDES/view',
        'BAD':           'https://drive.google.com/file/d/1PgNc8RWvhFu46IMJrxFHKUch1d6HcUWM/view',
        'BERGHAIN':      'https://drive.google.com/file/d/1HoecwsFtSMfrZtMjSK8Jmc9G7DP2EgJu8/view',
        'Brooklyn 1964': 'https://drive.google.com/file/d/1yYTSXbJI3J5hrv_ZrnieFF5VSjcQQGVE/view',
        'CARNAGE':       'https://drive.google.com/file/d/1IlVfl7t-f3XWXo4vmZM_90mZR3BNRkz8/view',
        'Distancia':     'https://drive.google.com/file/d/1bB34UQt3sfPWQ2mfSUVhMPkOyZupcuNe/view',
        'ECLIPSE':       'https://drive.google.com/file/d/1t1kZLHb9rbWGX-4YMRslvRw8OKstVFCO/view',
        'Elevation':     'https://drive.google.com/file/d/1GlgT0cPwyF7uhBHOTiRC26a0-5T5c6Pu/view',
        'EMPIRE':        'https://drive.google.com/file/d/1MDqTqQjCD50jETK-TsxK2KYKoyMLEva8/view',
        'Illusion':      'https://drive.google.com/file/d/13cwArN1QFNnYtjHdHbSa9zRox062FXUC/view',
        'Sabah':         'https://drive.google.com/file/d/1OIw_IZwhKmOKb46VMflP-JJin5kbzzFJ/view',
        'LARME':         'https://drive.google.com/file/d/17DEhRDFJrouMw6ONLy5Csx7maRHglXqr/view',
        'MEMORIES':      'https://drive.google.com/file/d/1q37XZVVPBuCJkqIOxrICOtaeHisbIbe6/view',
        'MIRAGE':        'https://drive.google.com/file/d/15cUNIMxH1KMhXmPlv5ZYh7p51tg63IQC/view',
        'Ombre':         'https://drive.google.com/file/d/1OSJ2OdTXg3jdypAjb2p8CYJya0DTGnRM/view',
        'Renaissance':   'https://drive.google.com/file/d/1r1F9RzegirGh883ppl7PQLrP4PIW7-Qf/view',
        'SHAKE':         'https://drive.google.com/file/d/1sVxYyG-YH5OY-FX3NVSlVBfVKAP0BNQU/view',
        'Solitude':      'https://drive.google.com/file/d/1RqGyCD8o2tlG_5tESRk-O1wjgqy29Q7O/view',
        'SOLUNA':        'https://drive.google.com/file/d/1e1jun_ZlSPPDvzAKA6GIve3AYm27No9v/view',
        'Sunset':        'https://drive.google.com/file/d/1vQwqf3GYVC1J1GCM-KV_F4sEkD2hDC_P/view',
        'TRUTH':         'https://drive.google.com/file/d/1LfiwN3Jm4qB1VEB9JNBUvX6c1LijJPlq/view',
        'ZURA':          'https://drive.google.com/file/d/16RReB9RJfMjuoBqXdfmQrubnRSP32OLv/view',
    };

    emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });

    // ===== VÉRIFICATION MOT DE PASSE =====
    async function sha256(message) {
        const msgBuffer = new TextEncoder().encode(message);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    const PASSWORD_CORRECT = 'Cheikhbane2003BEATS';

    function checkPassword() {
        const entered = document.getElementById('pwInput').value;
        if (entered === PASSWORD_CORRECT) {
            document.getElementById('pwGate').style.display = 'none';
            document.getElementById('mainContent').style.display = 'flex';
            loadContent();
        } else {
            document.getElementById('pwError').style.display = 'block';
            document.getElementById('pwInput').value = '';
            document.getElementById('pwInput').focus();
        }
    }

    document.getElementById('pwBtn').onclick = checkPassword;
    document.getElementById('pwInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') checkPassword();
    });

    // ===== CHARGEMENT DU CONTENU =====
    function loadContent() {
        const params = new URLSearchParams(window.location.search);
        let raw = params.get('d');

        if (raw) {
            try {
                const decoded = decodeURIComponent(raw);
                try { const b = atob(decoded); JSON.parse(b); raw = b; } catch(e) { raw = decoded; }
            } catch(e) {}
        }

        if (!raw) {
            document.getElementById('mainContent').innerHTML = `
                <div class="invalid-page">
                    <i class="fas fa-exclamation-triangle"></i>
                    <h2>LIEN INVALIDE</h2>
                </div>`;
            return;
        }

        try {
            const data = JSON.parse(raw);
            const customer_name  = data.n || data.customer_name  || '—';
            const customer_email = data.e || data.customer_email || '—';
            const total          = data.t || data.total          || '—';
            const lang           = data.l || data.lang           || 'fr';
            const beatTitles     = (data.b ? data.b.split(',') : []).map(s => s.trim()).filter(Boolean);

            let beatsHTML = '';
            beatTitles.forEach(title => {
                const link = driveLinks[title] || '#';
                beatsHTML += `
                    <div class="beat-row">
                        <i class="fas fa-music"></i>
                        <span style="flex:1">${title}</span>
                        <a href="${link}" target="_blank"><i class="fas fa-external-link-alt"></i> Drive</a>
                    </div>`;
            });

            const download_links = beatTitles.map(title => {
                const link = driveLinks[title] || '#';
                return `🎵 ${title}\n${link}`;
            }).join('\n\n');

            document.getElementById('mainContent').innerHTML = `
                <div class="send-card">
                    <div style="font-size:2.5rem;margin-bottom:12px">🎵</div>
                    <h1>ENVOYER LES BEATS</h1>
                    <p>Vérifie les infos ci-dessous puis clique le bouton pour envoyer les beats au client.</p>

                    <div class="order-info">
                        <div class="info-row"><span>CLIENT</span><span>${customer_name}</span></div>
                        <div class="info-row"><span>EMAIL</span><span>${customer_email}</span></div>
                        <div class="info-row"><span>TOTAL</span><span>${total}€</span></div>
                    </div>

                    <div class="beats-list">${beatsHTML}</div>

                    <button class="send-btn" id="sendBtn">
                        <i class="fas fa-paper-plane"></i> ENVOYER LES BEATS
                    </button>
                    <div class="status-msg" id="statusMsg"></div>
                </div>`;

            document.getElementById('sendBtn').onclick = () => {
                const btn = document.getElementById('sendBtn');
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Envoi en cours...';

                emailjs.send(
                    EMAILJS_SERVICE_ID,
                    lang === 'fr' ? EMAILJS_TEMPLATE_FR : EMAILJS_TEMPLATE_EN,
                    { customer_name, customer_email, download_links, total }
                ).then(() => {
                    const msg = document.getElementById('statusMsg');
                    msg.className = 'status-msg success';
                    msg.textContent = '✅ Beats envoyés avec succès à ' + customer_email + ' !';
                    msg.style.display = 'block';
                    btn.innerHTML = '<i class="fas fa-check"></i> ENVOYÉ !';
                }).catch(err => {
                    const msg = document.getElementById('statusMsg');
                    msg.className = 'status-msg error';
                    msg.textContent = '❌ Erreur : ' + (err.text || err);
                    msg.style.display = 'block';
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-paper-plane"></i> RÉESSAYER';
                });
            };

        } catch(e) {
            document.getElementById('mainContent').innerHTML = `
                <div class="invalid-page">
                    <i class="fas fa-exclamation-triangle"></i>
                    <h2>LIEN INVALIDE</h2>
                </div>`;
        }
    }

    // Curseur custom
    window.addEventListener('load', function() {
        const d = document.getElementById('cursorDot');
        const r = document.getElementById('cursorRing');
        if (!d || !r) return;
        let mx=0, my=0, rx=0, ry=0;
        document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; d.style.left=mx+'px'; d.style.top=my+'px'; });
        (function loop(){ rx+=(mx-rx)*0.12; ry+=(my-ry)*0.12; r.style.left=rx+'px'; r.style.top=ry+'px'; requestAnimationFrame(loop); })();
        document.querySelectorAll('button,a,input').forEach(el => {
            el.addEventListener('mouseenter', () => { d.classList.add('hovering'); r.classList.add('hovering'); });
            el.addEventListener('mouseleave', () => { d.classList.remove('hovering'); r.classList.remove('hovering'); });
        });
    });
    </script>
</body>
</html>
